<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Cost Estimator</title>
</head>
<body>
    <h1>Estimate your cost</h1>
    <div class="container">
        <div class="tabs">
            <p>Free</p>
            <p class="active">Team</p>
            <p>Professional</p>
            <p>Enterprise</p>
        </div>
        <div class="line"></div>
        <div class="toggle-wrapper">
            <img src="Images/icon1.png" alt="">
            <div class="toggle">
                <span>Mobile</span>
                <span>Web</span>
            </div>
            <img src="Images/icon2.png" alt="">
    </div>
    <div class="sessions-card">
        <p>Monthly Session</p>
        <p class="number">20,000</p>
    </div>
    <p class="description">A session is continous period of user activity on your web app or
        website. Choose exacly how many sessions you wish to record and discard the extras.
    </p>
    </div>
</body>
</html>
